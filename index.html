<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoFuture — The Future is Here.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #F4F6FA;
      --navy:  #0C1E45;
      --blue:  #1A6FD4;
      --cyan:  #45C4EE;
      --muted: #8A9BBD;
      --white: #FFFFFF;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--navy);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── PARTICLE CANVAS ── */
    #pCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 500;
      background: var(--bg);
      pointer-events: none;
    }

    /* ── LOGO ── */
    #logo {
      position: fixed;
      top: 28px;
      left: 36px;
      z-index: 400;
      display: flex;
      align-items: center;
      gap: 13px;
      opacity: 0;
      text-decoration: none;
      cursor: pointer;
    }

    #logo svg { width: 48px; height: 48px; overflow: visible; }

    .logo-text { display: flex; flex-direction: column; gap: 3px; }

    .logo-brand {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--navy);
      letter-spacing: 0.01em;
      line-height: 1;
    }

    .logo-brand span { color: var(--blue); }

    .logo-sub {
      font-family: 'Inter', sans-serif;
      font-size: 8px;
      font-weight: 300;
      letter-spacing: 0.32em;
      color: var(--blue);
      text-transform: uppercase;
    }

    /* Dot levitation — only when .levitate class is added */
    @keyframes lev1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(.4px,-1.6px)} 66%{transform:translate(-.4px,.6px)} }
    @keyframes lev2 { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-1px,1px)} 75%{transform:translate(1px,-.5px)} }
    @keyframes lev3 { 0%,100%{transform:translate(0,0)} 40%{transform:translate(.7px,1.2px)} 80%{transform:translate(-.7px,-1.2px)} }
    @keyframes lev4 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-.9px,-1.4px)} }

    #logo.levitate .d1 { animation: lev1 3.3s ease-in-out infinite; }
    #logo.levitate .d2 { animation: lev2 2.9s ease-in-out infinite .5s; }
    #logo.levitate .d3 { animation: lev3 3.6s ease-in-out infinite .2s; }
    #logo.levitate .d4 { animation: lev4 2.7s ease-in-out infinite .9s; }

    /* ── HERO ── */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      opacity: 0;
    }

    .hero-tagline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(10px, 1.1vw, 13px);
      font-weight: 200;
      letter-spacing: 0.35em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 192px;
    }

    /* ── CHAT RING (420px, content inside) ── */
    #chatRing {
      width: 420px;
      height: 420px;
      border-radius: 50%;
      border: 1px solid rgba(69,196,238,.28);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      box-shadow:
        0 0 60px rgba(69,196,238,.09),
        0 0 120px rgba(26,111,212,.05);
      animation: ringPulse 4s ease-in-out infinite;
      cursor: text;
    }

    /* outer echo rings */
    #chatRing::before {
      content: '';
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      border: 1px solid rgba(69,196,238,.1);
      animation: ringPulse 4s ease-in-out infinite .8s;
      pointer-events: none;
    }

    #chatRing::after {
      content: '';
      position: absolute;
      inset: -28px;
      border-radius: 50%;
      border: 1px solid rgba(69,196,238,.05);
      animation: ringPulse 4s ease-in-out infinite 1.4s;
      pointer-events: none;
    }

    @keyframes ringPulse {
      0%,100% { box-shadow: 0 0 60px rgba(69,196,238,.09), 0 0 120px rgba(26,111,212,.05); }
      50%      { box-shadow: 0 0 80px rgba(69,196,238,.16), 0 0 160px rgba(26,111,212,.08); }
    }

    /* Idle dot — shown before first message */
    #idleDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      opacity: .5;
      margin-bottom: 20px;
      animation: dotPulse 2.2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes dotPulse {
      0%,100% { opacity:.3; transform:scale(1); }
      50%      { opacity:.9; transform:scale(1.5); }
    }

    /* Chat messages */
    #chatMsgs {
      width: 100%;
      max-height: 200px;
      overflow-y: auto;
      display: none;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 16px;
      scrollbar-width: none;
    }
    #chatMsgs::-webkit-scrollbar { display: none; }

    .bubble {
      padding: 9px 13px;
      border-radius: 12px;
      font-size: 12.5px;
      line-height: 1.6;
      max-width: 88%;
      animation: fadeUp .3s ease;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .bubble.bot {
      background: var(--white);
      color: var(--navy);
      border: 1px solid rgba(12,30,69,.07);
      box-shadow: 0 2px 12px rgba(0,0,0,.04);
      align-self: flex-start;
    }

    .bubble.user {
      background: var(--navy);
      color: rgba(255,255,255,.9);
      align-self: flex-end;
    }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }

    .qr-btn {
      padding: 4px 11px;
      border: 1px solid rgba(26,111,212,.3);
      border-radius: 20px;
      font-family: 'Inter', sans-serif;
      font-size: 10.5px;
      font-weight: 300;
      color: var(--blue);
      background: transparent;
      cursor: pointer;
      transition: all .18s ease;
    }
    .qr-btn:hover { background: var(--blue); color: #fff; border-color: var(--blue); }

    /* Input row */
    .input-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(12,30,69,.14);
      padding-bottom: 8px;
      transition: border-color .25s;
    }
    .input-row:focus-within { border-color: var(--blue); }

    #chatInput {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 12.5px;
      font-weight: 300;
      color: var(--navy);
      outline: none;
      caret-color: var(--blue);
      text-align: center;
      transition: text-align .3s;
    }
    #chatInput.active { text-align: left; }
    #chatInput::placeholder { color: var(--muted); }

    #sendBtn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--blue);
      opacity: .4;
      transition: opacity .2s;
      display: flex;
      align-items: center;
      padding: 0;
      flex-shrink: 0;
    }
    #sendBtn:hover { opacity: 1; }

    /* Scroll cue */
    .scroll-cue {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      animation: scrollDrop 2.4s ease-in-out infinite;
      opacity: .6;
    }

    .scroll-cue span {
      font-size: 9px;
      letter-spacing: .25em;
      text-transform: uppercase;
      font-weight: 200;
    }

    @keyframes scrollDrop {
      0%,100%{ transform:translateX(-50%) translateY(0); opacity:.4; }
      50%{ transform:translateX(-50%) translateY(7px); opacity:.8; }
    }

    /* ── SERVICES ── */
    #services {
      background: var(--white);
      padding: 110px 48px 120px;
    }

    .sec-head {
      text-align: center;
      padding-bottom: 80px;
    }

    .sec-head h2 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(30px, 3.5vw, 46px);
      font-weight: 400;
      color: var(--navy);
      letter-spacing: .03em;
      margin-bottom: 12px;
    }

    .sec-head p {
      font-size: 11.5px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    /* Stream layout */
    .stream {
      max-width: 1020px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 44px;
    }

    /* Card */
    .sof-card {
      width: 76%;
      min-height: 130px;
      background: #fff;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 44px;
      padding: 28px 32px;
      box-shadow: 0 2px 20px rgba(12,30,69,.055);
      border: 1px solid rgba(12,30,69,.055);
      transition: transform .28s ease, box-shadow .28s ease;
      position: relative;
      overflow: hidden;
    }

    .sof-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--accent);
      border-radius: 20px 0 0 20px;
      opacity: .7;
    }

    .sof-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(12,30,69,.1);
    }

    .sof-illus {
      width: 88px;
      height: 88px;
      flex-shrink: 0;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .sof-illus svg { width: 72px; height: 72px; }

    .sof-text { flex: 1; min-width: 0; }

    .sof-tag {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: .24em;
      text-transform: uppercase;
      margin-bottom: 5px;
      opacity: .9;
    }

    .sof-title {
      font-family: 'DM Serif Display', serif;
      font-size: 19px;
      font-weight: 400;
      color: var(--navy);
      line-height: 1.25;
      margin-bottom: 7px;
    }

    .sof-desc {
      font-size: 12.5px;
      color: #56688A;
      line-height: 1.75;
      font-weight: 300;
    }

    @media (max-width: 700px) {
      .sof-card { width: 100% !important; margin-left: 0 !important; flex-direction: column; align-items: flex-start; gap: 18px; }
      #services { padding: 70px 24px 80px; }
    }

    @media (max-width: 500px) {
      .sof-illus { width: 64px; height: 64px; border-radius: 14px; }
      .sof-illus svg { width: 52px; height: 52px; }
      #services { padding: 60px 16px 70px; }
      #chatRing { width: min(340px, 90vw); height: min(340px, 90vw); padding: 36px; }
    }

    /* ── FOOTER ── */
    footer {
      background: var(--navy);
      padding: 44px 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    @media (max-width: 540px) {
      footer { padding: 36px 24px; flex-direction: column; text-align: center; }
    }

    .ft-brand {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      font-weight: 400;
      color: rgba(255,255,255,.85);
      letter-spacing: .04em;
    }

    .ft-info {
      text-align: right;
      font-size: 10.5px;
      font-weight: 200;
      color: rgba(255,255,255,.35);
      letter-spacing: .1em;
      line-height: 2;
    }
    @media (max-width: 540px) { .ft-info { text-align: center; } }

    .ft-info a {
      color: rgba(255,255,255,.55);
      text-decoration: none;
      transition: color .2s;
    }
    .ft-info a:hover { color: var(--cyan); }
  </style>
</head>
<body>

<!-- PARTICLE CANVAS -->
<canvas id="pCanvas"></canvas>

<!-- LOGO -->
<a id="logo" href="#hero" aria-label="SoFuture">
  <svg viewBox="0 0 48 48" fill="none">
    <circle class="d1" cx="15" cy="15" r="8"   fill="#0C1E45" opacity=".88"/>
    <circle class="d2" cx="34" cy="10" r="5"   fill="#45C4EE" opacity=".9"/>
    <circle class="d3" cx="10" cy="34" r="6.5" fill="#1A6FD4" opacity=".82"/>
    <circle class="d4" cx="32" cy="32" r="5.5" fill="#45C4EE" opacity=".78"/>
  </svg>
  <div class="logo-text">
    <span class="logo-brand">so<span>F</span>uture</span>
    <span class="logo-sub">Intelligence</span>
  </div>
</a>

<!-- HERO -->
<section id="hero">
  <p class="hero-tagline">The Future is Here.</p>

  <div id="chatRing">
    <div id="idleDot"></div>
    <div id="chatMsgs"></div>
    <div class="input-row">
      <input id="chatInput" type="text"
        placeholder="What can I do for you?"
        autocomplete="off" spellcheck="false" />

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"

  <div class="scroll-cue">
    <svg width="11" height="18" viewBox="0 0 11 22" fill="none">
      <path d="M5.5 1v16M1 13l4.5 5 4.5-5"
        stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span>scroll</span>
  </div>
</section>

<!-- SERVICES -->
<section id="services">
  <div class="sec-head">
    <h2>What We Build</h2>
    <p>Tailored solutions &mdash; real results</p>
  </div>
  <div class="stream" id="stream"></div>
</section>

<!-- FOOTER -->
<footer>
  <div class="ft-brand">soFuture</div>
  <div class="ft-info">
    <a href="mailto:general@sofuture.ai">general@sofuture.ai</a><br>
    sofuture.ai
  </div>
</footer>

<script>
/* ═══════════════════════════════════════════
   PARTICLES  (per-particle timing)
═══════════════════════════════════════════ */
const canvas = document.getElementById('pCanvas');
const ctx    = canvas.getContext('2d');
const logoEl = document.getElementById('logo');
const heroEl = document.getElementById('hero');

let W, H, pts = [], introTs = null, animDone = false, convStarted = false;

const TARGETS = [
  { px: 36+15, py: 28+15, r: 8,   c: [12,  30,  69],  n: 220 },
  { px: 36+34, py: 28+10, r: 5,   c: [69, 196, 238],  n: 120 },
  { px: 36+10, py: 28+34, r: 6.5, c: [26, 111, 212],  n: 170 },
  { px: 36+32, py: 28+32, r: 5.5, c: [69, 196, 238],  n: 140 },
];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function buildParticles() {
  pts = [];
  TARGETS.forEach(t => {
    for (let i = 0; i < t.n; i++) {
      const a   = Math.random() * Math.PI * 2;
      const rad = Math.random() * t.r * .85;
      pts.push({
        x:  Math.random() * W,
        y:  Math.random() * H,
        ox: 0, oy: 0,
        tx: t.px + Math.cos(a) * rad,
        ty: t.py + Math.sin(a) * rad,
        vx: (Math.random() - .5) * .5,
        vy: (Math.random() - .5) * .5,
        r:  Math.random() * 1.4 + .3,
        c:  t.c,
        alpha: Math.random() * .4 + .25,
        pDelay: Math.random() * 1400,
        pDur:   Math.random() * 1200 + 700,
      });
    }
  });
}

function eio(t) { return t < .5 ? 2*t*t : -1+(4-2*t)*t; }
function lerp(a, b, t) { return a + (b - a) * t; }

const FLOAT_END = 500;
const CONV_END  = FLOAT_END + 1400 + 1900 + 150;

function drawDot(x, y, r, c, a) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${a})`;
  ctx.fill();
}

function revealUI() {
  /* freeze final frame then crossfade: canvas out, logo+hero in */
  pts.forEach(p => drawDot(p.tx, p.ty, p.r, p.c, p.alpha));
  canvas.style.transition = 'opacity 1.3s ease';
  canvas.style.opacity    = '0';
  logoEl.style.transition = 'opacity 1.3s ease';
  logoEl.style.opacity    = '1';
  heroEl.style.transition = 'opacity 1.3s ease';
  heroEl.style.opacity    = '1';
  animDone = true;
  setTimeout(() => logoEl.classList.add('levitate'), 1400);
}

function frame(now) {
  if (animDone) return;
  const t = now - introTs;
  ctx.clearRect(0, 0, W, H);

  if (t < FLOAT_END) {
    /* ── FLOAT: brownian drift ── */
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vx += (Math.random() - .5) * .018;
      p.vy += (Math.random() - .5) * .018;
      p.vx *= .985; p.vy *= .985;
      drawDot(p.x, p.y, p.r, p.c, p.alpha);
    });

  } else if (t < CONV_END) {
    /* ── CONVERGE: each particle on its own schedule ── */
    if (!convStarted) {
      convStarted = true;
      pts.forEach(p => { p.ox = p.x; p.oy = p.y; });
    }

    let allArrived = true;
    pts.forEach(p => {
      const rel = t - FLOAT_END - p.pDelay;
      const q   = rel <= 0 ? 0 : eio(Math.min(rel / p.pDur, 1));
      if (q < 0.96) allArrived = false;
      p.x = lerp(p.ox, p.tx, q);
      p.y = lerp(p.oy, p.ty, q);
      drawDot(p.x, p.y, p.r, p.c, p.alpha);
    });

    if (allArrived) { revealUI(); return; }

  } else {
    revealUI(); return;
  }

  requestAnimationFrame(frame);
}

function startIntro() {
  convStarted = false;
  animDone    = false;
  resize();
  buildParticles();
  introTs = performance.now();
  requestAnimationFrame(frame);
}

window.addEventListener('resize', resize);
setTimeout(startIntro, 400);

/* ═══════════════════════════════════════════
   SERVICES
═══════════════════════════════════════════ */
const SERVICES = [
  {

    accent: '#7C3AED', bg: '#F5F0FF',
    illus: id => `<svg viewBox="0 0 72 72" fill="none"><defs><radialGradient id="g${id}" cx="50%" cy="40%" r="55%"><stop offset="0%" stop-color="#C4B5FD"/><stop offset="100%" stop-color="#7C3AED" stop-opacity=".15"/></radialGradient></defs><circle cx="36" cy="34" r="26" fill="url(#g${id})"/><circle cx="36" cy="20" r="5" fill="#7C3AED" opacity=".9"/><circle cx="22" cy="38" r="4" fill="#A78BFA" opacity=".85"/><circle cx="50" cy="38" r="4" fill="#A78BFA" opacity=".85"/><circle cx="28" cy="52" r="3.5" fill="#7C3AED" opacity=".7"/><circle cx="44" cy="52" r="3.5" fill="#7C3AED" opacity=".7"/><line x1="36" y1="25" x2="22" y2="34" stroke="#7C3AED" stroke-width="1.4" opacity=".4"/><line x1="36" y1="25" x2="50" y2="34" stroke="#7C3AED" stroke-width="1.4" opacity=".4"/><line x1="22" y1="42" x2="28" y2="48" stroke="#A78BFA" stroke-width="1.2" opacity=".4"/><line x1="50" y1="42" x2="44" y2="48" stroke="#A78BFA" stroke-width="1.2" opacity=".4"/><line x1="22" y1="38" x2="50" y2="38" stroke="#7C3AED" stroke-width="1" opacity=".2"/><circle cx="36" cy="20" r="2.5" fill="#fff" opacity=".7"/></svg>`
  },
  {
    tag: 'Customer Experience',
    title: 'AI Customer Service Agent',
    desc: 'Handles inquiries, complaints, and support tickets automatically — in any language, at any hour, without a single missed message.',
    accent: '#059669', bg: '#EDFAF5',
    illus: id => `<svg viewBox="0 0 72 72" fill="none"><defs><radialGradient id="g${id}" cx="40%" cy="45%" r="55%"><stop offset="0%" stop-color="#6EE7B7"/><stop offset="100%" stop-color="#059669" stop-opacity=".1"/></radialGradient></defs><ellipse cx="36" cy="36" rx="28" ry="26" fill="url(#g${id})"/><rect x="14" y="18" width="34" height="22" rx="8" fill="#059669" opacity=".85"/><path d="M22 40 L18 48 L30 42" fill="#059669" opacity=".85"/><circle cx="24" cy="29" r="2.5" fill="#fff" opacity=".9"/><circle cx="31" cy="29" r="2.5" fill="#fff" opacity=".9"/><circle cx="38" cy="29" r="2.5" fill="#fff" opacity=".9"/><rect x="28" y="34" width="26" height="16" rx="6" fill="#34D399" opacity=".6"/><circle cx="37" cy="42" r="2" fill="#fff" opacity=".7"/><circle cx="43" cy="42" r="2" fill="#fff" opacity=".7"/></svg>`
  },
  {
    tag: 'Sales & Growth',
    title: 'AI Sales Agent',

});

/* scroll reveal */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.style.opacity    = '1';
      e.target.style.transform  = 'translateY(0)';
    }
  });
}, { threshold: .06 });

document.querySelectorAll('.sof-card').forEach((el, i) => {
  el.style.opacity   = '0';
  el.style.transform = 'translateY(14px)';
  el.style.transition = `opacity .5s ease ${i * .04}s, transform .5s ease ${i * .04}s, box-shadow .28s`;
  io.observe(el);
});

const msgsEl  = document.getElementById('chatMsgs');
const inputEl = document.getElementById('chatInput');
const sendEl  = document.getElementById('sendBtn');
const ringEl  = document.getElementById('chatRing');
const idleDot = document.getElementById('idleDot');

let chatLive = false;

function openChat() {
  if (chatLive) return;
  chatLive = true;
  idleDot.style.display = 'none';
  msgsEl.style.display  = 'flex';
  inputEl.classList.add('active');
}

function addMsg(html, who, qrs = []) {
  openChat();
  const b = document.createElement('div');
  b.className = `bubble ${who}`;
  b.innerHTML = html;
  if (qrs.length) {
    const wrap = document.createElement('div');
    wrap.className = 'quick-replies';
    qrs.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'qr-btn';
      btn.textContent = q.label;
      btn.onclick = () => handleMsg(q.val || q.label, q.label);
      wrap.appendChild(btn);
    });
    b.appendChild(wrap);
  }
  msgsEl.appendChild(b);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

const delay = ms => new Promise(r => setTimeout(r, ms));

async function botSay(html, qrs = [], d = 380) {
  await delay(d);
  addMsg(html, 'bot', qrs);
}

/* ── Knowledge base ── */
let KB    = null;
let uLang = 'en'; /* user language — sticky across quick-reply clicks */

async function loadKB() {
  try {
    const r = await fetch('./answers.json');
    KB = (await r.json()).intents || [];
  } catch(e) { KB = []; }
}

/* Detect Polish without \b — JS \b doesn't understand non-ASCII chars.
   We check for Polish diacritics OR common unambiguous Polish words. */
function detectLang(t) {
  return /[ąęóśłźżćń]|czym|jakie|jaki|jak |czy |ile |gdzie |kiedy |usług|ofert|kontakt|cena|koszt|spotkanie|proces|etapy|macie|robicie|zajmujecie|budujecie|tworzycie|agenci|cennik|chciałbym|chciałabym/i.test(t)
    ? 'pl' : 'en';
}

function findIntent(lo, lang) {
  if (!KB || !KB.length) return null;
  /* Scoring-based matching: each matched keyword contributes its character
     length to the intent's score. Longer keywords are more specific, so
     a high-scoring intent beats the first keyword hit.
     Try preferred language first, then fallback to the other. */
  const orders = lang === 'pl'
    ? ['keywords_pl','keywords_en']
    : ['keywords_en','keywords_pl'];
  for (const key of orders) {
    let best = null, bestScore = 0;
    for (const intent of KB) {
      if (intent.id === 'fallback') continue;
      let score = 0;
      for (const kw of (intent[key] || [])) {
        if (lo.includes(kw.toLowerCase())) score += kw.length;
      }
      if (score > bestScore) { bestScore = score; best = intent; }
    }
    if (best) return best;
  }
  return KB.find(i => i.id === 'fallback') || null;
}

function buildReply(intent, lang) {
  const pl = lang === 'pl';
  return {
    t: pl ? intent.response_pl : intent.response_en,
    q: pl ? (intent.quick_replies_pl || []) : (intent.quick_replies_en || [])
  };
}

function getReply(m, lang) {
  const pl = lang === 'pl';
  const lo = m.toLowerCase().trim();

  /* ── #id direct routing (quick-reply buttons & manual typing) ── */
  if (lo.startsWith('#') && KB) {
    const id     = lo.slice(1);
    const intent = KB.find(i => i.id === id);
    if (intent) return buildReply(intent, lang);
  }

  /* ── Keyword search ── */
  const match = findIntent(lo, lang);
  if (match) return buildReply(match, lang);

  /* ── Static fallback (KB not loaded yet) ── */
  return pl
    ? { t:'Hmm, mogę Ci powiedzieć więcej o SoFuture, usługach lub procesie współpracy.',
        q:[{label:'Co robicie?',val:'#what_we_do'},{label:'Jakie usługi?',val:'#services'},{label:'Kontakt',val:'#contact'}] }
    : { t:"Not sure I caught that. I can tell you about SoFuture, our services, or how we work.",
        q:[{label:'What do you do?',val:'#what_we_do'},{label:'Services',val:'#services'},{label:'Contact',val:'#contact'}] };
}

async function handleMsg(text, displayLabel) {
  const t = text.trim();
  if (!t) return;

  inputEl.value = ''; /* always clear — regardless of message type */

  if (t.startsWith('mailto:')) { window.location.href = t; return; }

  if (t.startsWith('#')) {
    /* quick-reply or manual #id — show label bubble, keep existing language */
    if (displayLabel) addMsg(displayLabel, 'user');
  } else {
    /* typed text — update language, show user bubble */
    uLang = detectLang(t);
    addMsg(t, 'user');
  }

  const rep = getReply(t, uLang);
  await botSay(rep.t, rep.q || []);
}

loadKB();

sendEl.addEventListener('click', () => handleMsg(inputEl.value));
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleMsg(inputEl.value); });
inputEl.addEventListener('focus', () => inputEl.classList.add('active'));
ringEl.addEventListener('click', () => inputEl.focus());
</script>
