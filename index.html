<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoFuture ‚ÄĒ The Future is Here.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #F4F6FA;
      --navy:  #0C1E45;
      --blue:  #1A6FD4;
      --cyan:  #45C4EE;
      --muted: #8A9BBD;
      --white: #FFFFFF;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--navy);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ‚ĒÄ‚ĒÄ PARTICLE CANVAS ‚ĒÄ‚ĒÄ */
    #pCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 500;
      background: var(--bg);
      pointer-events: none;
    }

    /* ‚ĒÄ‚ĒÄ LOGO ‚ĒÄ‚ĒÄ */
    #logo {
      position: fixed;
      top: 28px;
      left: 36px;
      z-index: 400;
      display: flex;
      align-items: center;
      gap: 13px;
      opacity: 0;
      text-decoration: none;
      cursor: pointer;
    }

    #logo svg { width: 48px; height: 48px; overflow: visible; }

    .logo-text { display: flex; flex-direction: column; gap: 3px; }

    .logo-brand {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--navy);
      letter-spacing: 0.01em;
      line-height: 1;
    }

    .logo-brand span { color: var(--blue); }

    .logo-sub {
      font-family: 'Inter', sans-serif;
      font-size: 8px;
      font-weight: 300;
      letter-spacing: 0.32em;
      color: var(--blue);
      text-transform: uppercase;
    }

    /* Dot levitation ‚ÄĒ only when .levitate class is added */
    @keyframes lev1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(.4px,-1.6px)} 66%{transform:translate(-.4px,.6px)} }
    @keyframes lev2 { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-1px,1px)} 75%{transform:translate(1px,-.5px)} }
    @keyframes lev3 { 0%,100%{transform:translate(0,0)} 40%{transform:translate(.7px,1.2px)} 80%{transform:translate(-.7px,-1.2px)} }
    @keyframes lev4 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-.9px,-1.4px)} }

    #logo.levitate .d1 { animation: lev1 3.3s ease-in-out infinite; }
    #logo.levitate .d2 { animation: lev2 2.9s ease-in-out infinite .5s; }
    #logo.levitate .d3 { animation: lev3 3.6s ease-in-out infinite .2s; }
    #logo.levitate .d4 { animation: lev4 2.7s ease-in-out infinite .9s; }

    /* ‚ĒÄ‚ĒÄ HERO ‚ĒÄ‚ĒÄ */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      opacity: 0;
    }

    .hero-tagline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(10px, 1.1vw, 13px);
      font-weight: 200;
      letter-spacing: 0.35em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 192px;
    }

    /* ‚ĒÄ‚ĒÄ CHAT RING (420px, content inside) ‚ĒÄ‚ĒÄ */
    #chatRing {
      width: 420px;
      height: 420px;
      border-radius: 50%;
      border: 1px solid rgba(69,196,238,.28);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      box-shadow:
        0 0 60px rgba(69,196,238,.09),
        0 0 120px rgba(26,111,212,.05);
      animation: ringPulse 4s ease-in-out infinite;
      cursor: text;
    }

    /* outer echo rings */
    #chatRing::before {
      content: '';
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      border: 1px solid rgba(69,196,238,.1);
      animation: ringPulse 4s ease-in-out infinite .8s;
      pointer-events: none;
    }

    #chatRing::after {
      content: '';
      position: absolute;
      inset: -28px;
      border-radius: 50%;
      border: 1px solid rgba(69,196,238,.05);
      animation: ringPulse 4s ease-in-out infinite 1.4s;
      pointer-events: none;
    }

    @keyframes ringPulse {
      0%,100% { box-shadow: 0 0 60px rgba(69,196,238,.09), 0 0 120px rgba(26,111,212,.05); }
      50%      { box-shadow: 0 0 80px rgba(69,196,238,.16), 0 0 160px rgba(26,111,212,.08); }
    }

    /* Idle dot ‚ÄĒ shown before first message */
    #idleDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      opacity: .5;
      margin-bottom: 20px;
      animation: dotPulse 2.2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes dotPulse {
      0%,100% { opacity:.3; transform:scale(1); }
      50%      { opacity:.9; transform:scale(1.5); }
    }

    /* Chat messages */
    #chatMsgs {
      width: 100%;
      max-height: 200px;
      overflow-y: auto;
      display: none;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 16px;
      scrollbar-width: none;
    }
    #chatMsgs::-webkit-scrollbar { display: none; }

    .bubble {
      padding: 9px 13px;
      border-radius: 12px;
      font-size: 12.5px;
      line-height: 1.6;
      max-width: 88%;
      animation: fadeUp .3s ease;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .bubble.bot {
      background: var(--white);
      color: var(--navy);
      border: 1px solid rgba(12,30,69,.07);
      box-shadow: 0 2px 12px rgba(0,0,0,.04);
      align-self: flex-start;
    }

    .bubble.user {
      background: var(--navy);
      color: rgba(255,255,255,.9);
      align-self: flex-end;
    }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }

    .qr-btn {
      padding: 4px 11px;
      border: 1px solid rgba(26,111,212,.3);
      border-radius: 20px;
      font-family: 'Inter', sans-serif;
      font-size: 10.5px;
      font-weight: 300;
      color: var(--blue);
      background: transparent;
      cursor: pointer;
      transition: all .18s ease;
    }
    .qr-btn:hover { background: var(--blue); color: #fff; border-color: var(--blue); }

    /* Input row */
    .input-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(12,30,69,.14);
      padding-bottom: 8px;
      transition: border-color .25s;
    }
    .input-row:focus-within { border-color: var(--blue); }

    #chatInput {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 12.5px;
      font-weight: 300;
      color: var(--navy);
      outline: none;
      caret-color: var(--blue);
      text-align: center;
      transition: text-align .3s;
    }
    #chatInput.active { text-align: left; }
    #chatInput::placeholder { color: var(--muted); }

    #sendBtn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--blue);
      opacity: .4;
      transition: opacity .2s;
      display: flex;
      align-items: center;
      padding: 0;
      flex-shrink: 0;
    }
    #sendBtn:hover { opacity: 1; }

    /* Scroll cue */
    .scroll-cue {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      animation: scrollDrop 2.4s ease-in-out infinite;
      opacity: .6;
    }

    .scroll-cue span {
      font-size: 9px;
      letter-spacing: .25em;
      text-transform: uppercase;
      font-weight: 200;
    }

    @keyframes scrollDrop {
      0%,100%{ transform:translateX(-50%) translateY(0); opacity:.4; }
      50%{ transform:translateX(-50%) translateY(7px); opacity:.8; }
    }

    /* ‚ĒÄ‚ĒÄ SERVICES ‚ĒÄ‚ĒÄ */
    #services {
      background: var(--white);
      padding: 110px 48px 120px;
    }

    .sec-head {
      text-align: center;
      padding-bottom: 80px;
    }

    .sec-head h2 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(30px, 3.5vw, 46px);
      font-weight: 400;
      color: var(--navy);
      letter-spacing: .03em;
      margin-bottom: 12px;
    }

    .sec-head p {
      font-size: 11.5px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    /* Stream layout */
    .stream {
      max-width: 1020px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 44px;
    }

    /* Card */
    .sof-card {
      width: 76%;
      min-height: 130px;
      background: #fff;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 44px;
      padding: 28px 32px;
      box-shadow: 0 2px 20px rgba(12,30,69,.055);
      border: 1px solid rgba(12,30,69,.055);
      transition: transform .28s ease, box-shadow .28s ease;
      position: relative;
      overflow: hidden;
    }

    .sof-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--accent);
      border-radius: 20px 0 0 20px;
      opacity: .7;
    }

    .sof-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(12,30,69,.1);
    }

    .sof-illus {
      width: 88px;
      height: 88px;
      flex-shrink: 0;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .sof-illus svg { width: 72px; height: 72px; }

    .sof-text { flex: 1; min-width: 0; }

    .sof-tag {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: .24em;
      text-transform: uppercase;
      margin-bottom: 5px;
      opacity: .9;
    }

    .sof-title {
      font-family: 'DM Serif Display', serif;
      font-size: 19px;
      font-weight: 400;
      color: var(--navy);
      line-height: 1.25;
      margin-bottom: 7px;
    }

    .sof-desc {
      font-size: 12.5px;
      color: #56688A;
      line-height: 1.75;
      font-weight: 300;
    }

    @media (max-width: 700px) {
      .sof-card { width: 100% !important; margin-left: 0 !important; flex-direction: column; align-items: flex-start; gap: 18px; }
      #services { padding: 70px 24px 80px; }
    }

    @media (max-width: 500px) {
      .sof-illus { width: 64px; height: 64px; border-radius: 14px; }
      .sof-illus svg { width: 52px; height: 52px; }
      #services { padding: 60px 16px 70px; }
      #chatRing { width: min(340px, 90vw); height: min(340px, 90vw); padding: 36px; }
    }

    /* ‚ĒÄ‚ĒÄ FOOTER ‚ĒÄ‚ĒÄ */
    footer {
      background: var(--navy);
      padding: 44px 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    @media (max-width: 540px) {
      footer { padding: 36px 24px; flex-direction: column; text-align: center; }
    }

    .ft-brand {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      font-weight: 400;
      color: rgba(255,255,255,.85);
      letter-spacing: .04em;
    }

    .ft-info {
      text-align: right;
      font-size: 10.5px;
      font-weight: 200;
      color: rgba(255,255,255,.35);
      letter-spacing: .1em;
      line-height: 2;
    }
    @media (max-width: 540px) { .ft-info { text-align: center; } }

    .ft-info a {
      color: rgba(255,255,255,.55);
      text-decoration: none;
      transition: color .2s;
    }
    .ft-info a:hover { color: var(--cyan); }
  </style>
</head>

<!-- PARTICLE CANVAS -->
<canvas id="pCanvas"></canvas>

<!-- LOGO -->
<a id="logo" href="#hero" aria-label="SoFuture">
  <svg viewBox="0 0 48 48" fill="none">
    <circle class="d1" cx="15" cy="15" r="8"   fill="#0C1E45" opacity=".88"/>
    <circle class="d2" cx="34" cy="10" r="5"   fill="#45C4EE" opacity=".9"/>
    <circle class="d3" cx="10" cy="34" r="6.5" fill="#1A6FD4" opacity=".82"/>

  </svg>
  <div class="logo-text">
    <span class="logo-brand">so<span>F</span>uture</span>

<section id="hero">
  <p class="hero-tagline">The Future is Here.</p>

  <div id="chatRing">

          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="scroll-cue">
    <svg width="11" height="18" viewBox="0 0 11 22" fill="none">
      <path d="M5.5 1v16M1 13l4.5 5 4.5-5"
        stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span>scroll</span>

</section>

<!-- SERVICES -->
<section id="services">
  <div class="sec-head">
    <h2>What We Build</h2>
    <p>Tailored solutions &mdash; real results</p>
  </div>
  <div class="stream" id="stream"></div>
</section>

<!-- FOOTER -->
<footer>
  <div class="ft-brand">soFuture</div>
  <div class="ft-info">
    <a href="mailto:general@sofuture.ai">general@sofuture.ai</a><br>
    sofuture.ai
  </div>
</footer>

function drawDot(x, y, r, c, a) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${a})`;
  ctx.fill();
}

function revealUI() {
  /* freeze final frame then crossfade: canvas out, logo+hero in */
  pts.forEach(p => drawDot(p.tx, p.ty, p.r, p.c, p.alpha));
  canvas.style.transition = 'opacity 1.3s ease';
  canvas.style.opacity    = '0';
  logoEl.style.transition = 'opacity 1.3s ease';
  logoEl.style.opacity    = '1';
  heroEl.style.transition = 'opacity 1.3s ease';
  heroEl.style.opacity    = '1';
  animDone = true;
  setTimeout(() => logoEl.classList.add('levitate'), 1400);
}

function frame(now) {
  if (animDone) return;
  const t = now - introTs;
  ctx.clearRect(0, 0, W, H);

  if (t < FLOAT_END) {
    /* ‚ĒÄ‚ĒÄ FLOAT: brownian drift ‚ĒÄ‚ĒÄ */
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vx += (Math.random() - .5) * .018;
      p.vy += (Math.random() - .5) * .018;
      p.vx *= .985; p.vy *= .985;
      drawDot(p.x, p.y, p.r, p.c, p.alpha);
    });

  } else if (t < CONV_END) {
    /* ‚ĒÄ‚ĒÄ CONVERGE: each particle on its own schedule ‚ĒÄ‚ĒÄ */
    if (!convStarted) {
      convStarted = true;
      pts.forEach(p => { p.ox = p.x; p.oy = p.y; });
    }

    let allArrived = true;
    pts.forEach(p => {
      const rel = t - FLOAT_END - p.pDelay;
      const q   = rel <= 0 ? 0 : eio(Math.min(rel / p.pDur, 1));
      if (q < 0.96) allArrived = false;
      p.x = lerp(p.ox, p.tx, q);
      p.y = lerp(p.oy, p.ty, q);
      drawDot(p.x, p.y, p.r, p.c, p.alpha);
    });

    if (allArrived) { revealUI(); return; }

  } else {
    revealUI(); return;
  }

  requestAnimationFrame(frame);
}

function startIntro() {
  convStarted = false;
  animDone    = false;
  resize();
  buildParticles();
  introTs = performance.now();
  requestAnimationFrame(frame);
}

window.addEventListener('resize', resize);

  card.innerHTML = `
    <div class="sof-illus" style="background:${s.bg}">${s.illus(i)}</div>

      <div class="sof-tag" style="color:${s.accent}">${s.tag}</div>
      <div class="sof-title">${s.title}</div>

    </div>`;
  streamEl.appendChild(card);
});

/* scroll reveal */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.style.opacity    = '1';
      e.target.style.transform  = 'translateY(0)';
    }
  });
}, { threshold: .06 });

document.querySelectorAll('.sof-card').forEach((el, i) => {
  el.style.opacity   = '0';
  el.style.transform = 'translateY(14px)';
  el.style.transition = `opacity .5s ease ${i * .04}s, transform .5s ease ${i * .04}s, box-shadow .28s`;
  io.observe(el);
});
